<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="description" content="OriginDNA bekleme listesindesiniz — Ekim'deki geliştirme öncesinde erken erişim için sizinle iletişime geçeceğiz.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<title>Listedesiniz — OriginDNA</title>
<style>
  :root { --paper:#F2EFE6; --ink:#191611; --accent:#E23D0E; --muted:#6F6A5C;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace; }
  @media (prefers-color-scheme: dark) { :root { --paper:#141208; --ink:#EDE8D9; --accent:#FF6B3D; --muted:#938D7B; } }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--mono);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:560px; }
  .label { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  h1 { font-size:clamp(26px,5vw,40px); text-transform:uppercase; line-height:1.15; margin:14px 0 16px; }
  h1 .acc { color:var(--accent); }
  p { color:var(--muted); }
  a.btn { display:inline-block; margin-top:18px; padding:12px 22px; border:1px solid var(--ink);
    background:var(--ink); color:var(--paper); text-decoration:none; font-size:13px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.04em; }
  a.btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">ORIGINDNA — BEKLEME LİSTESİ</div>
    <h1>Artık <span class="acc">listedesiniz.</span></h1>
    <p>Teşekkürler — Ekim'deki geliştirme öncesinde erken erişim için sizinle
    iletişime geçeceğiz. Toplamda birkaç e-posta, spam yok. Bu arada 2 Aralık 2026
    AB işaretleme son tarihi, uyum kanalınıza iletmeye değer bir bilgi.</p>
    <a class="btn" href="/tr/products/origin/">← OriginDNA'ya dön</a>
  </div>
</body>
</html>
