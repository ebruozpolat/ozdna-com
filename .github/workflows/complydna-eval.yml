name: ComplyDNA Eval

on:
  pull_request:
    paths:
      - "complydna/**"
  push:
    branches:
      - main
    paths:
      - "complydna/**"

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: complydna
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -m "not integration" -q

      - name: Run golden-set eval
        run: python evals/run.py
