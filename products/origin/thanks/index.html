<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>You're on the list — OriginDNA</title>
<style>
  :root { --paper:#F2EFE6; --ink:#191611; --accent:#E23D0E; --muted:#6F6A5C;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace; }
  @media (prefers-color-scheme: dark) { :root { --paper:#141208; --ink:#EDE8D9; --accent:#FF6B3D; --muted:#938D7B; } }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--mono);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:560px; }
  .label { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  h1 { font-size:clamp(26px,5vw,40px); text-transform:uppercase; line-height:1.15; margin:14px 0 16px; }
  h1 .acc { color:var(--accent); }
  p { color:var(--muted); }
  a.btn { display:inline-block; margin-top:18px; padding:12px 22px; border:1px solid var(--ink);
    background:var(--ink); color:var(--paper); text-decoration:none; font-size:13px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.04em; }
  a.btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">ORIGINDNA — WAITLIST</div>
    <h1>You're on <span class="acc">the list.</span></h1>
    <p>Thanks — we'll be in touch about early access before the October build.
    A handful of emails total, no spam. Meanwhile, the December 2, 2026 EU
    marking deadline is a good thing to forward to your compliance channel.</p>
    <a class="btn" href="/products/origin/">← Back to OriginDNA</a>
  </div>
</body>
</html>
