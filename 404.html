<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>404 — ozDNA</title>
<style>
  :root { --paper:#F2EFE6; --ink:#191611; --accent:#E23D0E; --muted:#6F6A5C;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace; }
  @media (prefers-color-scheme: dark) { :root { --paper:#141208; --ink:#EDE8D9; --accent:#FF6B3D; --muted:#938D7B; } }
  body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--mono);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { max-width:520px; }
  .label { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  h1 { font-size:clamp(26px,5vw,40px); text-transform:uppercase; line-height:1.15; margin:14px 0 16px; }
  h1 .acc { color:var(--accent); }
  p { color:var(--muted); }
  a { color:inherit; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">OZDNA.COM — 404</div>
    <h1>No DNA record <span class="acc">found.</span></h1>
    <p>This page doesn't exist. Try the <a href="/">ozDNA home page</a>,
    <a href="/products/comply/">ComplyDNA</a> or <a href="/products/origin/">OriginDNA</a>.</p>
  </div>
</body>
</html>
