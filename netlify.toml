[build]
  publish = "."

# Netlify (site ozdna-614) is the CANONICAL host for ozdna.com — see docs/DOMAIN.md (decided 2026-07-08).
[[redirects]]
  from = "http://ozdna.com/*"
  to = "https://ozdna.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.ozdna.com/*"
  to = "https://www.ozdna.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ozdna.com/*"
  to = "https://ozdna.com/:splat"
  status = 301
  force = true

# Two-product live pages (rebuilt 2026-07-11): /architecture/, /pricing/, /roadmap/,
# /security/, /trust/, /partners/ now serve two-product content in EN and /tr/ — no
# redirect. Legacy platform-era pages with no two-product equivalent redirect (below).

# Retired platform-era pages — redirect to the nearest live page (EN)
[[redirects]]
  from = "/benchmarks/*"
  to = "/products/origin/"
  status = 301
  force = true

[[redirects]]
  from = "/sdk/*"
