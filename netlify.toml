[build]
  publish = "."

# Netlify (site ozdna-614) is the CANONICAL host for ozdna.com — see docs/DOMAIN.md (decided 2026-07-08).
[[redirects]]
  from = "http://ozdna.com/*"
  to = "https://ozdna.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.ozdna.com/*"
  to = "https://www.ozdna.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ozdna.com/*"
