  force = true

[[redirects]]
  from = "/changelog/*"
  to = "/roadmap/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/case-studies/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/compare/*"
  to = "/"
  status = 301
  force = true

# Retired platform-era pages — redirect to the nearest live page (TR)
